server:
  port: 9000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: PRODUK
            uri: lb://PRODUK
            predicates:
              - Path=/api/product/**
          - id: ORDER-SERVICE
            uri: lb://ORDER
            predicates:
              - Path=/api/order/**

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost